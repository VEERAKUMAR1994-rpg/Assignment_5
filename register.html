<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gaura EV Register page">
    <title>Gaura Ev Point | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

</head>
<body>
    <!-- Header Section -->
    <header>
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
            <div class="container">
                <a class="navbar-brand" href="index.html">GAURA</a>
                <button class="navbar-toggler">
                    <span class="navbar-toggler-icon" data-bs-toggle="collapse" data-bs-target="#navbarNav"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end align-items-center" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link text-light fw-normal" href="index.html">Home</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Section -->
    <main>
        <div style="height: 50px;"></div>
        <div class="container my-5">
            <h2 class="text-center mb-4">Book your Ride with Gaura EV</h2>

            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10 ">
                    <form action="success.html">
                        <div class="row g-3 mb-3">
                           <div class="col-md-6">
                             <input type="text" class="form-control" required placeholder="Full Name">
                           </div>
                           <div class="col-md-6">
                             <input type="text" class="form-control" required placeholder="Last Name">
                           </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                             <input type="number" class="form-control" required placeholder="Age">
                           </div>
                           <div class="col-md-6">
                             <input type="tel" class="form-control" required placeholder="Phone">
                           </div>
                        </div>
                           <div class="mt-3">
                            <input type="email" class="form-control" required placeholder="Email">
                           </div>
                           <div class="d-grid mt-3
                           ">
                            <button class="btn btn-lg btn-success">Book Ride</button>
                           </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

     <!-- Footer Section -->
    <footer class="bg-dark text-light p-3">
        <div class="container text-center">
            <p class="mb-0">Gaura &COPY; Copy Right 2026. | All Rights Reserved.</p>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
